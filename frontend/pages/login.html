<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA Agendamentos para Clínica Médica</title>

    <link rel="stylesheet" href="../css/login.css">
    <script src="../pages/login.js" defer></script>
</head>

<body>

    <header>

        <img src="../image/logo_sem_fundo.png" alt="">

    </header>

    <main class="container">

        <div class="logo-login">
            <img src="../image/logo.png" alt="Logo Clínica Para Você">
        </div>

        <section class="login">

            <h1 class="h1-login">Faça Seu login</h1>

            <form>

                <div class="modal-login">

                    <label for="email">E-mail</label>
                    <input type="email" id="email">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha">

                    <div class="lembrar">
                        <label for="lembrar">Lembrar-me</label>
                        <input type="checkbox" id="lembrar">
                    </div>
                </div>

                <button>Cadastrar-se</button>
                <button>Entrar</button>

            </form>

        </section>

    </main>
    <footer>
        <p>&copy; 2026 Clínica Para Você. Todos os direitos reservados.</p>
    </footer>

</body>

</html>
