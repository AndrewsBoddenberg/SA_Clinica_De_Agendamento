<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA Agendamentos para Clínica Médica</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="../pages/login.js" defer></script>
</head>

<body>

    <main class="container">

        <div class="logo-login">
            <img src="../image/logo.png" alt="Logo Clínica Para Você">
        </div>

        <section class="login">
            <div class="logo-principal">
                <img src="../image/logo.png" alt="Logo Ícone">
            </div>

            <h1 class="h1-login">Faça Seu login</h1>

            <form>
                <div class="modal-login">
                    <label for="email">E-mail</label>
                    <input type="email" id="email">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha">

                    <div class="lembrar">
                        <label for="lembrar">Lembrar-me</label>
                        <input type="checkbox" id="lembrar">
                    </div>
                </div>

                <button type="button">Cadastrar-se</button>
                <button type="submit">Entrar</button>
            </form>
        </section>

    </main>

    <footer>
    <div class="footer-container">
        <p>&copy; 2026 Clínica Para Você.</p>
        
        <div class="footer-icons">
            <a href="https://api.whatsapp.com/send?phone=5500000000000" target="_blank" class="icon-whatsapp" aria-label="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
            
            <a href="https://google.com" target="_blank" class="icon-google" aria-label="Google">
                <i class="fa-brands fa-google"></i>
            </a>

            <a href="https://instagram.com/seu_perfil" target="_blank" class="icon-instagram" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
    </a>
        </div>
    </div>
</footer>

</body>
