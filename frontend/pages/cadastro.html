<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela De Cadastro</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="../js/cadastro.js" defer></script>
</head>

<body class="min-vh-100 d-flex flex-column">

    <header>

    </header>

<main class="d-flex align-items-center justify-content-center flex-grow-1 py-3 py-sm-4" style="min-height: 100vh;">

    <div class="card shadow-sm w-100 mx-3" style="max-width: 380px; border: none; border-radius: 12px;">
        <div class="card-body p-3 p-sm-4">
            
            <div class="text-center mb-2">
                <img src="../image/logo.png" alt="Logo" class="img-fluid" style="max-height: 120px;">
            </div>

            <h4 class="card-title text-center fw-bold mb-1 titulo-cadastro">Criar Conta</h4>
            <p class="text-center small mb-3 subtitulo-cadastro text-muted">Preencha os dados abaixo</p> 

            <form>
                <div class="mb-2">
                    <label for="nome" class="form-label small fw-medium mb-1">Nome Completo</label>
                    <input type="text" class="form-control form-control-sm" id="nome" placeholder="Digite seu nome" required>
                </div>

                <h2 class="card-title text-center fw-bold mb-2 titulo-cadastro">Criar Conta</h2>

                <p class="text-center mb-4 subtitulo-cadastro">Preencha os dados abaixo para se cadastrar</p>

                <form>

                    <div class="mb-3">
                        <label for="nome" class="form-label fw-medium">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
                    </div>


                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="cpf" class="form-label fw-medium">CPF</label>
                        <input type="number" class="form-control" id="cpf" placeholder="CPF" required>
                    </div>

                    <div class="mb-3">
                        <label for="datanascimento" class="form-label fw-medium">Data de Nascimento</label>
                        <input type="date" class="form-control" id="datanascimento" placeholder="Data de Nascimento" required>
                    </div>


                    <div class="mb-3">
                        <label  for="telefone" class="form-label fw-medium">Telefone / WhatsApp</label>
                        <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-9999">
                    </div>


                    <div class="mb-3">
                        <label for="senha" class="form-label fw-medium">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="Crie uma senha forte"
                            required>
                    </div>


                    <div class="mb-4">
                        <label for="confirmarSenha" class="form-label fw-medium">Confirmar Senha</label>
                        <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a senha"
                            required>
                    </div>


                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="termos" required>
                        <label class="form-check-label texto-termos" for="termos">
                            Eu aceito os <a href="#" class="text-decoration-none link-termos">Termos de Uso</a> e a <a
                                href="#" class="text-decoration-none link-termos">Política de Privacidade</a>.
                        </label>
                    </div>


                    <button type="submit" id="botaoCadastro"
                        class="btn btn-primary w-100 py-2 fw-semibold mb-3 btn-cadastro">Cadastrar</button>
                </form>


                <div class="text-center texto-login-container">
                    <span class="texto-ja-tem-conta">Já tem uma conta?</span>
                    <a href="#" class="link-login">Fazer Login</a>
                </div>

                <div class="mb-2">
                    <label for="telefone" class="form-label small fw-medium mb-1">Telefone / WhatsApp</label>
                    <input type="tel" class="form-control form-control-sm" id="telefone" placeholder="(11) 99999-9999">
                </div>

                <div class="mb-2">
                    <label for="senha" class="form-label small fw-medium mb-1">Senha</label>
                    <input type="password" class="form-control form-control-sm" id="senha" placeholder="Crie uma senha forte" required>
                </div>

                <div class="mb-3">
                    <label for="confirmarSenha" class="form-label small fw-medium mb-1">Confirmar Senha</label>
                    <input type="password" class="form-control form-control-sm" id="confirmarSenha" placeholder="Repita a senha" required>
                </div>

                <div class="mb-3 form-check small">
                    <input type="checkbox" class="form-check-input" id="termos" required>
                    <label class="form-check-label texto-termos" for="termos">
                        Eu aceito os <a href="#" class="text-decoration-none link-termos">Termos</a> e a <a href="#" class="text-decoration-none link-termos">Privacidade</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mb-2 btn-cadastro">Cadastrar</button>
            </form>

            <div class="text-center small texto-login-container">
                <span class="texto-ja-tem-conta text-muted">Já tem uma conta?</span>
                <a href="#" class="link-login text-decoration-none fw-medium">Fazer Login</a>
            </div>
        </div>
    </div>

</main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Clínica Para Você.</p>

            <div class="footer-icons">
                <a href="https://api.whatsapp.com/send?phone=5500000000000" target="_blank" class="icon-whatsapp"
                    aria-label="WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>

                <a href="https://google.com" target="_blank" class="icon-google" aria-label="Google">
                    <i class="fa-brands fa-google"></i>
                </a>

                <a href="https://instagram.com/seu_perfil" target="_blank" class="icon-instagram"
                    aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </div>
        </div>
    </footer>

</body>

</html>
